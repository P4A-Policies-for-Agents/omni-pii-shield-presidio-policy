apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: pii-shield-playground
spec:
  address: http://0.0.0.0:8081
  services:
    upstream:
      address: http://backend:80
      routes:
        - config:
            destinationPath: /
  policies:
    - policyRef:
        # `make run` patches name/namespace to the built policy ref.
        name: pii-shield-presidio-policy-impl
      config:
        # Presidio services hosted on Railway. Redaction defaults to local
        # splicing from analyzer offsets; set operator.serverSide: true on a
        # rule to delegate that rewrite to the Anonymizer instead.
        # MANAGED GATEWAY: if Presidio is on Railway/Vercel/Render/Heroku/Cloudflare/Fly.io, you MUST use the loopback pin (analyzerPathPrefix + a passthrough route with auto_host_rewrite). See README "Deployment shape". This playground is a self-managed gateway, so a direct URL is fine here.
        analyzerUrl: https://presidio-railway-production.up.railway.app
        anonymizerUrl: https://presidio-railway-anonymizer-production.up.railway.app
        # Safe-by-default rollout: observe everywhere, redact emails +
        # phone numbers, block payment data outright.
        defaultAction: audit
        language: en
        scoreThreshold: 0.5
        rules:
          - entityType: CREDIT_CARD
            action: block
          - entityType: IBAN_CODE
            action: block
          - entityType: EMAIL_ADDRESS
            action: redact
            operator:
              kind: replace
              newValue: "<EMAIL_ADDRESS>"
          - entityType: PHONE_NUMBER
            action: redact
            operator:
              kind: mask
              maskingChar: "*"
              charsToMask: 6
              fromEnd: true
