# Local playground: Omni/Flex Gateway in front of a JSON backend. The policy
# calls a Presidio Analyzer over the public internet (Railway-hosted), so no
# local Presidio sidecar is needed.
#
#   caller ──► flex-gateway :8081 ──► backend (httpbin)
#                    │
#                    └── POST https://presidio-railway-production.up.railway.app/analyze
#
# `make run` copies the built policy into ./config/custom-policies and
# boots this stack. Point your MCP / A2A / LLM client at :8081.
#
# To run Presidio locally instead, add back:
#   presidio-analyzer:
#     image: mcr.microsoft.com/presidio-analyzer:latest
#     ports: ["5002:3000"]
# and set analyzerUrl: http://presidio-analyzer:3000 in config/api.yaml.
version: "3.8"

services:
  flex-gateway:
    image: mulesoft/flex-gateway:1.9.0
    ports:
      - "8081:8081"
    volumes:
      - ./config:/usr/local/share/mulesoft/flex-gateway/conf.d/
    depends_on:
      - backend

  backend:
    image: kennethreitz/httpbin
